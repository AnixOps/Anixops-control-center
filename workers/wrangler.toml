name = "anixops-api-v2"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# 开发环境配置
[dev]
port = 8787
local_protocol = "http"

# 环境变量
[vars]
ENVIRONMENT = "production"
JWT_EXPIRE = "86400"

# 自定义域名路由
[[routes]]
pattern = "api.anixops.com"
custom_domain = true

# ==================== 环境配置 ====================

# Staging 测试环境
[env.staging]
name = "anixops-api-staging"
vars = { ENVIRONMENT = "staging", JWT_EXPIRE = "86400" }

# Staging D1 数据库 (使用独立的测试数据库)
[[env.staging.d1_databases]]
binding = "DB"
database_name = "anixops-db-staging"
database_id = "staging-db-id-placeholder"
migrations_dir = "migrations"

# Staging KV 命名空间
[[env.staging.kv_namespaces]]
binding = "KV"
id = "staging-kv-id-placeholder"

# Staging R2 存储桶
[[env.staging.r2_buckets]]
binding = "R2"
bucket_name = "anixops-files-staging"

# 生产环境
[env.production]
name = "anixops-api-prod"
vars = { ENVIRONMENT = "production", JWT_EXPIRE = "86400" }

# Production D1 数据库
[[env.production.d1_databases]]
binding = "DB"
database_name = "anixops-db"
database_id = "1fd85576-c08d-44f3-a0fb-ec5fc845f1e5"
migrations_dir = "migrations"

# Production KV 命名空间
[[env.production.kv_namespaces]]
binding = "KV"
id = "35a39ccc4cea47e89aa8b1459f85e1cf"

# Production R2 存储桶
[[env.production.r2_buckets]]
binding = "R2"
bucket_name = "anixops-files"

# ==================== 默认绑定（本地开发） ====================

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "anixops-db"
database_id = "1fd85576-c08d-44f3-a0fb-ec5fc845f1e5"
migrations_dir = "migrations"

# KV 命名空间绑定 (会话缓存)
[[kv_namespaces]]
binding = "KV"
id = "35a39ccc4cea47e89aa8b1459f85e1cf"

# R2 存储桶绑定 (文件存储)
[[r2_buckets]]
binding = "R2"
bucket_name = "anixops-files"

# Durable Objects (实时通信) - 暂时禁用以调试
# [[durable_objects.bindings]]
# name = "WEBSOCKET_SERVER"
# class_name = "WebSocketServer"

# 触发器 (定时任务)
# [triggers]
# crons = ["*/5 * * * *"]  # 每5分钟执行一次节点状态检查