name: Flutter Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0-rc.1)'
        required: true
        type: string
      prerelease:
        description: 'Pre-release'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            mobile/.dart_tool
            mobile/build
          key: ${{ runner.os }}-flutter-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Decode Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > mobile/android/keystore/anixops-release.jks

      - name: Build APK
        working-directory: mobile
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          echo "storePassword=$ANDROID_STORE_PASSWORD" > android/key.properties
          echo "keyPassword=$ANDROID_KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$ANDROID_KEY_ALIAS" >> android/key.properties
          echo "storeFile=keystore/anixops-release.jks" >> android/key.properties
          flutter build apk --release

      - name: Build AAB
        working-directory: mobile
        run: flutter build appbundle --release

      - name: Rename artifacts
        run: |
          VERSION="${{ github.event.inputs.version }}"
          mv mobile/build/app/outputs/flutter-apk/app-release.apk anixops-${VERSION}-android.apk
          mv mobile/build/app/outputs/bundle/release/app-release.aab anixops-${VERSION}-android.aab

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            anixops-${{ github.event.inputs.version }}-android.apk
            anixops-${{ github.event.inputs.version }}-android.aab
          retention-days: 90

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build Web
        working-directory: mobile
        run: flutter build web --release

      - name: Create archive
        run: |
          VERSION="${{ github.event.inputs.version }}"
          cd mobile/build/web
          zip -r ../../../anixops-${VERSION}-web.zip .

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: anixops-${{ github.event.inputs.version }}-web.zip
          retention-days: 90

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build Windows
        working-directory: mobile
        run: flutter build windows --release

      - name: Create archive
        run: |
          $VERSION = "${{ github.event.inputs.version }}"
          Compress-Archive -Path mobile/build/windows/x64/runner/Release/* -DestinationPath anixops-$VERSION-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: anixops-${{ github.event.inputs.version }}-windows.zip
          retention-days: 90

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build macOS
        working-directory: mobile
        run: flutter build macos --release

      - name: Create archive
        run: |
          VERSION="${{ github.event.inputs.version }}"
          cd mobile/build/macos/Build/Products/Release
          zip -r ../../../../../anixops-${VERSION}-macos.zip "AnixOps.app"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: anixops-${{ github.event.inputs.version }}-macos.zip
          retention-days: 90

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build Linux
        working-directory: mobile
        run: flutter build linux --release

      - name: Create archive
        run: |
          VERSION="${{ github.event.inputs.version }}"
          cd mobile/build/linux/x64/release
          tar -czvf ../../../../../anixops-${VERSION}-linux.tar.gz bundle

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: anixops-${{ github.event.inputs.version }}-linux.tar.gz
          retention-days: 90

  build-ios:
    name: Build iOS (No Code Signing)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build iOS (No Codesign)
        working-directory: mobile
        run: flutter build ios --release --no-codesign

      - name: Create archive
        run: |
          VERSION="${{ github.event.inputs.version }}"
          cd mobile/build/ios/iphoneos
          zip -r ../../../../../anixops-${VERSION}-ios-nocodesign.zip Runner.app

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: anixops-${{ github.event.inputs.version }}-ios-nocodesign.zip
          retention-days: 90

  release:
    name: Create Release
    needs: [build-android, build-web, build-windows, build-macos, build-linux, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.apk" -o -name "*.aab" -o -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} release/ \;
          cd release
          sha256sum * > checksums.sha256
          sha512sum * > checksums.sha512
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: AnixOps Mobile ${{ github.event.inputs.version }}
          prerelease: ${{ github.event.inputs.prerelease }}
          generate_release_notes: true
          body: |
            ## AnixOps Control Center ${{ github.event.inputs.version }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Android | `anixops-${{ github.event.inputs.version }}-android.apk` |
            | Android (AAB) | `anixops-${{ github.event.inputs.version }}-android.aab` |
            | Web | `anixops-${{ github.event.inputs.version }}-web.zip` |
            | Windows | `anixops-${{ github.event.inputs.version }}-windows.zip` |
            | macOS | `anixops-${{ github.event.inputs.version }}-macos.zip` |
            | Linux | `anixops-${{ github.event.inputs.version }}-linux.tar.gz` |
            | iOS (No Code Signing) | `anixops-${{ github.event.inputs.version }}-ios-nocodesign.zip` |

            ### What's Included
            - Dashboard with real-time server statistics
            - Node management and monitoring
            - Ansible playbook execution
            - Push notifications
            - Biometric authentication
            - Multi-language support (EN, ZH, JA, AR)

            ### Known Limitations
            - Requires AnixOps backend server
            - iOS build requires code signing for App Store distribution
          files: release/*
          draft: false