# AnixOps Logstash Pipeline Configuration
# For processing and shipping logs to Elasticsearch

input {
  # HTTP input for API logs
  http {
    host => "0.0.0.0"
    port => 5044
    codec => json
    tags => ["api"]
  }

  # File input for application logs
  file {
    path => "/var/log/anixops/*.log"
    start_position => "beginning"
    codec => json
    tags => ["application"]
  }

  # Beats input for agent logs
  beats {
    port => 5045
    tags => ["agent"]
  }

  # Kafka input for distributed logs
  kafka {
    bootstrap_servers => "kafka:9092"
    topics => ["anixops-logs"]
    group_id => "logstash-consumer"
    codec => json
    tags => ["distributed"]
  }
}

filter {
  # Parse JSON logs
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"
    }
  }

  # Extract timestamp
  date {
    match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS"]
    target => "@timestamp"
    timezone => "UTC"
  }

  # Add geoip from IP addresses
  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }

  # Parse user agent
  if [user_agent] {
    useragent {
      source => "user_agent"
      target => "user_agent_parsed"
    }
  }

  # Convert log levels
  if [level] {
    mutate {
      add_field => { "log_level" => "%{level}" }
    }
  }

  # Add service tags
  if [service] {
    mutate {
      add_tag => ["%{service}"]
    }
  }

  # Extract trace context
  if [traceId] {
    mutate {
      add_field => { "trace_id" => "%{traceId}" }
    }
  }

  if [spanId] {
    mutate {
      add_field => { "span_id" => "%{spanId}" }
    }
  }

  # Calculate processing time
  if [duration_ms] {
    ruby {
      code => "event.set('duration_seconds', event.get('duration_ms').to_f / 1000.0)"
    }
  }

  # Error classification
  if [level] == "error" or [level] == "fatal" {
    mutate {
      add_tag => ["error"]
    }

    if [stack_trace] {
      grok {
        match => {
          "stack_trace" => [
            "at %{DATA:method}\(%{DATA:file}:%{NUMBER:line_number}\)",
            "at %{DATA:method}\(%{DATA:file}\)"
          ]
        }
      }
    }
  }

  # Request metrics extraction
  if [http] {
    mutate {
      rename => { "http.method" => "http_method" }
      rename => { "http.path" => "http_path" }
      rename => { "http.status_code" => "http_status" }
    }

    # Response time buckets
    if [duration_ms] {
      ruby {
        code => "
          duration = event.get('duration_ms').to_f
          if duration < 100
            event.set('response_time_bucket', 'fast')
          elsif duration < 500
            event.set('response_time_bucket', 'medium')
          else
            event.set('response_time_bucket', 'slow')
          end
        "
      }
    }
  }

  # Tenant context
  if [tenantId] {
    mutate {
      add_field => { "tenant_id" => "%{tenantId}" }
    }
  }

  # Remove sensitive fields
  mutate {
    remove_field => ["password", "token", "secret", "api_key", "authorization"]
  }

  # Add metadata
  mutate {
    add_field => {
      "environment" => "%{[env][ENVIRONMENT]}"
      "hostname" => "%{[host][name]}"
      "application" => "anixops"
    }
  }
}

output {
  # Elasticsearch output
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "anixops-logs-%{+YYYY.MM.dd}"
    template_name => "anixops-logs"
    template_overwrite => true
  }

  # Debug output (disable in production)
  # stdout { codec => rubydebug }

  # Archive to S3 (optional)
  # s3 {
  #   access_key_id => "${AWS_ACCESS_KEY_ID}"
  #   secret_access_key => "${AWS_SECRET_ACCESS_KEY}"
  #   region => "us-east-1"
  #   bucket => "anixops-logs-archive"
  #   prefix => "logs/%{+YYYY}/%{+MM}/%{+dd}/"
  #   codec => json_lines
  #   rotate_every => 3600
  # }

  # Send alerts for errors
  if "error" in [tags] and [level] == "fatal" {
    http {
      url => "${ALERT_WEBHOOK_URL}"
      http_method => "post"
      content_type => "application/json"
      format => "json"
      mapping => {
        "text" => "Fatal error in AnixOps: %{message}"
        "service" => "%{service}"
        "trace_id" => "%{traceId}"
        "timestamp" => "%{@timestamp}"
      }
    }
  }
}

# Pipeline settings
# config/pipelines.yml:
# - pipeline.id: anixops-main
#   path.config: "/etc/logstash/conf.d/anixops.conf"
#   pipeline.workers: 4
#   pipeline.batch.size: 125
#   pipeline.batch.delay: 50