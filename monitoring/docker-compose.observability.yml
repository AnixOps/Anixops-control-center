version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: anixops-elasticsearch
    environment:
      - node.name=elasticsearch
      - cluster.name=anixops-logs
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./elasticsearch/index-template.json:/usr/share/elasticsearch/config/index-template.json
      - ./elasticsearch/ilm-policy.json:/usr/share/elasticsearch/config/ilm-policy.json
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - anixops-monitoring

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: anixops-logstash
    volumes:
      - ./logstash/anixops.conf:/usr/share/logstash/pipeline/logstash.conf
      - logstash_data:/usr/share/logstash/data
    ports:
      - "5044:5044"
      - "5045:5045"
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - "LS_JAVA_OPTS=-Xms512m -Xmx512m"
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-http://localhost:8080/api/v1/alerts}
    networks:
      - anixops-monitoring

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: anixops-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=anixops-kibana
      - SERVER_HOST=0.0.0.0
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - anixops-monitoring

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: anixops-prometheus
    volumes:
      - ../prometheus.yml:/etc/prometheus/prometheus.yml
      - ../prometheus-rules.yaml:/etc/prometheus/rules/alerts.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - anixops-monitoring

  grafana:
    image: grafana/grafana:10.2.0
    container_name: anixops-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ../grafana-dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - elasticsearch
    networks:
      - anixops-monitoring

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    container_name: anixops-filebeat
    user: root
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: filebeat -e -strict.perms=false
    depends_on:
      - logstash
    networks:
      - anixops-monitoring

volumes:
  elasticsearch_data:
    driver: local
  logstash_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  anixops-monitoring:
    driver: bridge