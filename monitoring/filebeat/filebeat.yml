# AnixOps Filebeat Configuration

filebeat.inputs:
  # Application logs
  - type: log
    enabled: true
    paths:
      - /var/log/anixops/*.log
    json.keys_under_root: true
    json.add_error_key: true
    fields:
      app: anixops
      type: application
    fields_under_root: true

  # Docker container logs
  - type: container
    enabled: true
    paths:
      - /var/lib/docker/containers/*/*.log
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"

  # System logs
  - type: log
    enabled: true
    paths:
      - /var/log/syslog
      - /var/log/messages
    fields:
      type: system
    fields_under_root: true

# Processors
processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_cloud_metadata: ~
  - add_docker_metadata: ~

  # Drop sensitive fields
  - drop_fields:
      fields: ["password", "token", "secret", "api_key", "authorization"]
      ignore_missing: true

  # Add timestamp
  - timestamp:
      field: timestamp
      layouts:
        - '2006-01-02T15:04:05.999Z'
        - '2006-01-02 15:04:05'
      ignore_missing: true

# Output to Logstash
output.logstash:
  hosts: ["logstash:5045"]
  bulk_max_size: 2048

# Alternative: Output directly to Elasticsearch
# output.elasticsearch:
#   hosts: ["elasticsearch:9200"]
#   index: "anixops-logs-%{+yyyy.MM.dd}"
#   pipeline: "anixops-pipeline"

# Kibana settings
setup.kibana:
  host: "kibana:5601"

# Logging
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644

# Monitoring
monitoring.enabled: true
monitoring.elasticsearch:
  hosts: ["elasticsearch:9200"]